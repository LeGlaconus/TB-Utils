{
	"version": 9,
	"name": "Source",
	"icon": "Icon.png",
	"fileformats": [
		{ "format": "Quake2 (Valve)"},
		{ "format": "Quake2" }
	],
	"filesystem": {
		"searchpath": ".",
		"packageformat": { "extension": ".pak", "format": "idpak" }
	},
	"materials": {
		"root": "materials",
		"format": { "extensions": [".tga", ".spr"], "format": "image" },
		"excludes": [ "*_normal", "*_height", "*_tooltexture", "*_mask", "*_specmask", "models/*", "console/*", "debug/*", "editor/*", "engine/*", "environment maps/*", "FOG/*", "hlmv/*", "launcher/*", "obsolete/*", "skybox/*", "voice/*", "vguiedit/*"]
	},
	"entities": {
		"definitions": [ "garrysmod.fgd" ],
		"defaultcolor": "0.6 0.6 0.6 1.0"
	},
    "tags": {
		"brush": [
			{
				"name": "Areaportal",
				"attribs": [ "transparent" ],
				"match": "classname",
				"pattern": "*_areaportal",
				"material": "tools/toolsareaportal"
			},
			{
				"name": "Trigger",
				"attribs": [ "transparent" ],
				"match": "classname",
				"pattern": "trigger*",
				"material": "tools/toolstrigger"
			}
		],
		"brushface": [
			{
				"name": "Clip",
				"attribs": [ "transparent" ],
				"match": "contentflag",
				"flags": [ "clip" ]
			},
			{
				"name": "Detail",
				"match": "contentflag",
				"flags": [ "detail" ]
			},
			{
				"name": "Hint",
				"attribs": [ "transparent" ],
				"match": "surfaceflag",
				"flags": [ "hint" ]
			},
			{
				"name": "Liquid",
				"match": "contentflag",
				"flags": [ "slime", "water" ]
			},
			{
				"name": "Nodraw",
				"attribs": [ "transparent" ],
				"match": "surfaceflag",
				"flags": [ "nodraw" ]
			},
			{
				"name": "Origin",
				"attribs": [ "transparent" ],
				"match": "contentflag",
				"flags": [ "origin" ]
			},
			{
				"name": "Skip",
				"attribs": [ "transparent" ],
				"match": "surfaceflag",
				"flags": [ "skip" ]
			},
			{
				"name": "Sky",
				"attribs": [],
				"match": "surfaceflag",
				"flags": [ "sky" ]
			},
			{
				"name": "Slick",
				"attribs": [],
				"match": "surfaceflag",
				"flags": [ "slick" ]
			},
			{
				"name": "Transparent",
				"attribs": [ "transparent" ],
				"match": "surfaceflag",
				"flags": [ "trans" ]
			}
		]
    },
